services:
  - type: web
    name: sunclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: SUNCLAW_GATEWAY_PORT
        value: "8080"
      - key: SUNCLAW_STATE_DIR
        value: /data/.sunclaw
      - key: SUNCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: SUNCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: sunclaw-data
      mountPath: /data
      sizeGB: 1
