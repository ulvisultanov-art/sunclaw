name: SunClaw
options:
  bundleIdPrefix: ai.sunclaw
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  SunClawKit:
    path: ../shared/SunClawKit
  Swabble:
    path: ../swabble
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 147.0.0

schemes:
  SunClaw:
    shared: true
    build:
      targets:
        SunClaw: all
    test:
      targets:
        - SunClawTests
        - SunClawLogicTests
  SunClawLogicTests:
    shared: true
    build:
      targets:
        SunClawLogicTests: all
    test:
      targets:
        - SunClawLogicTests

targets:
  SunClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: SunClawShareExtension
        embed: true
      - target: SunClawActivityWidget
        embed: true
      - target: SunClawWatchApp
      - package: SunClawKit
      - package: SunClawKit
        product: SunClawChatUI
      - package: SunClawKit
        product: SunClawProtocol
      - package: Swabble
        product: SwabbleKit
      - package: WebRTC
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../config/swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchExtension,$SRCROOT/../shared/SunClawKit,$SRCROOT/../swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/SunClaw.entitlements
        CODE_SIGN_STYLE: "$(SUNCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUNCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUNCLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SUNCLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          SUNCLAW_PUSH_TRANSPORT: direct
          SUNCLAW_PUSH_DISTRIBUTION: local
          SUNCLAW_PUSH_RELAY_BASE_URL: ""
          SUNCLAW_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          SUNCLAW_PUSH_TRANSPORT: direct
          SUNCLAW_PUSH_DISTRIBUTION: local
          SUNCLAW_PUSH_RELAY_BASE_URL: ""
          SUNCLAW_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: SunClaw
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.sunclaw.ios
            CFBundleURLSchemes:
              - sunclaw
        CFBundleShortVersionString: "$(SUNCLAW_MARKETING_VERSION)"
        SunClawCanonicalVersion: "$(SUNCLAW_IOS_VERSION)"
        CFBundleVersion: "$(SUNCLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.sunclaw.ios.bgrefresh
        NSLocalNetworkUsageDescription: SunClaw discovers and connects to your SunClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
          NSAllowsLocalNetworking: true
        NSBonjourServices:
          - _sunclaw-gw._tcp
        NSCameraUsageDescription: SunClaw can capture photos or short video clips when requested via the gateway.
        NSCalendarsUsageDescription: SunClaw uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsFullAccessUsageDescription: SunClaw uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsWriteOnlyAccessUsageDescription: SunClaw uses your calendars to add events when you enable calendar access.
        NSContactsUsageDescription: SunClaw uses your contacts so you can search and reference people while using the assistant.
        NSLocationWhenInUseUsageDescription: SunClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: SunClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: SunClaw uses the microphone for realtime chat, voice wake, and push-to-talk.
        NSMotionUsageDescription: SunClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: SunClaw needs photo library access when you choose existing photos to share with your assistant.
        NSRemindersFullAccessUsageDescription: SunClaw uses your reminders to list, add, and complete tasks when you enable reminders access.
        NSSpeechRecognitionUsageDescription: SunClaw uses on-device speech recognition for talk mode and voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        SunClawPushTransport: "$(SUNCLAW_PUSH_TRANSPORT)"
        SunClawPushDistribution: "$(SUNCLAW_PUSH_DISTRIBUTION)"
        SunClawPushRelayBaseURL: "$(SUNCLAW_PUSH_RELAY_BASE_URL)"
        SunClawPushAPNsEnvironment: "$(SUNCLAW_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  SunClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: SunClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SUNCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUNCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUNCLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SUNCLAW_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: SunClaw Share
        CFBundleShortVersionString: "$(SUNCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUNCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  SunClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/SunClawActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SUNCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUNCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUNCLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: SunClaw Activity
        CFBundleShortVersionString: "$(SUNCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUNCLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  SunClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: SunClawWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(SUNCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(SUNCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SUNCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUNCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUNCLAW_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SUNCLAW_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: SunClaw
        CFBundleShortVersionString: "$(SUNCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUNCLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(SUNCLAW_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  SunClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(SUNCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(SUNCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SUNCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUNCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SUNCLAW_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SUNCLAW_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: SunClaw
        CFBundleShortVersionString: "$(SUNCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUNCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(SUNCLAW_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  SunClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: SunClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SUNCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUNCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.sunclaw.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SunClaw.app/SunClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: SunClawTests
        CFBundleShortVersionString: "$(SUNCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUNCLAW_BUILD_VERSION)"

  SunClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: SunClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SUNCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SUNCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.sunclaw.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: SunClawLogicTests
        CFBundleShortVersionString: "$(SUNCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(SUNCLAW_BUILD_VERSION)"
