apiVersion: v1
kind: ConfigMap
metadata:
  name: sunclaw-config
  labels:
    app: sunclaw
data:
  sunclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "port": 18789,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.sunclaw/workspace"
        },
        "list": [
          {
            "id": "default",
            "name": "SunClaw Assistant",
            "workspace": "~/.sunclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |
    # SunClaw Assistant

    You are a helpful AI assistant running in Kubernetes.
